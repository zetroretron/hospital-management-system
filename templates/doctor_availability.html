{% extends "base.html" %}

{% block title %}Set Availability{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-calendar-plus"></i> Set Your Availability</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <p class="text-muted">Select the days and time slots you'll be available for the next 7 days</p>

            {% for day in next_7_days %}
            <div class="card mb-3">
                <div class="card-header">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="day_{{ loop.index0 }}"
                            id="day_{{ loop.index0 }}" {% if day.isoformat() in availabilities %}checked{% endif %}>
                        <label class="form-check-label" for="day_{{ loop.index0 }}">
                            <strong>{{ day.strftime('%A, %d %B %Y') }}</strong>
                        </label>
                    </div>
                </div>
                <div class="card-body">
                    <div class="row">
                        {% for slot in time_slots %}
                        <div class="col-md-4 mb-2">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                    name="slots_{{ loop.parent.loop.index0 }}" value="{{ slot }}"
                                    id="slot_{{ loop.parent.loop.index0 }}_{{ loop.index }}" {% if day.isoformat() in
                                    availabilities and slot in availabilities[day.isoformat()] %}checked{% endif %}>
                                <label class="form-check-label"
                                    for="slot_{{ loop.parent.loop.index0 }}_{{ loop.index }}">
                                    {{ slot }}
                                </label>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-check-circle"></i> Save Availability
            </button>
        </form>
    </div>
</div>
{% endblock %}
